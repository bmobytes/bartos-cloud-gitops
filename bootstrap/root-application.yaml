apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bartos-cloud
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:bmobytes/bartos-cloud-gitops.git
    targetRevision: main
    path: clusters/bartos-cloud
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
