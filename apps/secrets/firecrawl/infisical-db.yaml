apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: firecrawl-db-claim
  namespace: firecrawl
spec:
  hostAPI: https://app.infisical.com/api
  syncConfig:
    resyncInterval: 60s
    instantUpdates: false
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: bartos-k8s-6-lmc
        envSlug: prod
        secretsPath: "/firecrawl/db"
        recursive: false
      credentialsRef:
        secretName: universal-auth-credentials
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: firecrawl-db
      secretNamespace: firecrawl
      creationPolicy: Owner
