apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: unifi-daily-briefing-secrets-claim
  namespace: unifi-daily-briefing
spec:
  hostAPI: https://app.infisical.com/api
  syncConfig:
    resyncInterval: 60s
    instantUpdates: false
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: bartos-k8s-6-lmc
        envSlug: prod
        secretsPath: "/unifi-daily-briefing"
        recursive: false
      credentialsRef:
        secretName: universal-auth-credentials
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: unifi-daily-briefing-secrets
      secretNamespace: unifi-daily-briefing
      creationPolicy: Owner
