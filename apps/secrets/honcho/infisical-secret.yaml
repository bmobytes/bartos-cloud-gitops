apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: honcho-llm-claim
  namespace: honcho
spec:
  hostAPI: https://app.infisical.com/api
  syncConfig:
    resyncInterval: 60s
    instantUpdates: false
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: bartos-k8s-6-lmc
        envSlug: prod
        secretsPath: "/"
        secretName: OPENROUTER_HONCHO
        recursive: false
      credentialsRef:
        secretName: universal-auth-credentials
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: honcho-llm
      secretNamespace: honcho
      creationPolicy: Owner
