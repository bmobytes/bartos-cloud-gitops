apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns
  namespace: external-dns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: external-dns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.14.2
          args:
            - --provider=webhook
            - --source=ingress
            - --domain-filter=bartos.media
            - --policy=sync
            - --log-level=info
            - --interval=1m
            - --webhook-provider-url=http://localhost:3000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
        - name: technitium-webhook
          image: ghcr.io/roosmaa/external-dns-technitium-webhook:main
          env:
            - name: TECHNITIUM_URL
              value: "http://192.168.140.102:5380"
            - name: TECHNITIUM_USERNAME
              valueFrom:
                secretKeyRef:
                  name: technitium-credentials
                  key: username
            - name: TECHNITIUM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: technitium-credentials
                  key: password
            - name: ZONE
              value: "bartos.media"
            - name: DOMAIN_FILTERS
              value: "bartos.media"
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
