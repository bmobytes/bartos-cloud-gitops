# Long-lived token for the infisical-auth service account.
# The Infisical operator presents this token when authenticating
# with Infisical Cloud via Kubernetes Auth.
#
# NOTE: This token is valid for 10 years. Rotate manually if needed.
apiVersion: v1
kind: Secret
metadata:
  name: infisical-auth-token
  namespace: infisical
  annotations:
    kubernetes.io/service-account.name: infisical-auth
type: kubernetes.io/service-account-token
