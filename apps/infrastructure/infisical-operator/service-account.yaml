# Service account used by InfisicalSecret CRDs to authenticate with
# Infisical Cloud via Kubernetes Auth.
#
# This SA has a long-lived token (created separately) that Infisical
# validates against the configured Machine Identity.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infisical-auth
  namespace: infisical
  labels:
    app.kubernetes.io/part-of: infisical
