---
# Hermes Agent - Namespace & RBAC
# Gives Hermes full admin over all namespace-scoped resources
# plus the ability to create and manage namespaces.
#
# What Hermes CAN do:
#   - Create, update, delete namespaces
#   - Full admin within any namespace (deployments, services,
#     ingresses, PVCs, configmaps, secrets, RBAC, etc.)
#   - Manage Argo CD Application resources
#   - Read storage classes and ingress classes (to make decisions)
#
# What Hermes CANNOT do:
#   - Touch nodes or cluster configuration
#   - Modify storage classes or ingress classes

apiVersion: v1
kind: Namespace
metadata:
  name: hermes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hermes-cluster-role
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingressclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]

  # Argo CD application resources
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets", "appprojects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # CRD management (needed for operator installs)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # ClusterRole management (needed for operator RBAC)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Operator auth requirements
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]

  # Infisical operator CRDs
  - apiGroups: ["secrets.infisical.com"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hermes-namespace-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: hermes
    namespace: hermes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hermes-cluster-ops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hermes-cluster-role
subjects:
  - kind: ServiceAccount
    name: hermes
    namespace: hermes
---
apiVersion: v1
kind: Secret
metadata:
  name: hermes-token
  namespace: hermes
  annotations:
    kubernetes.io/service-account.name: hermes
type: kubernetes.io/service-account-token
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes
  namespace: hermes
