apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-redis
  labels:
    {{- include "firecrawl.labels" . | nindent 4 }}
    app.kubernetes.io/name: firecrawl-redis
    app.kubernetes.io/component: redis
spec:
  replicas: {{ .Values.redis.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: firecrawl-redis
      app.kubernetes.io/part-of: firecrawl
  template:
    metadata:
      labels:
        app.kubernetes.io/name: firecrawl-redis
        app.kubernetes.io/component: redis
        {{- include "firecrawl.labels" . | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redisImage.repository }}:{{ .Values.redisImage.tag }}"
          imagePullPolicy: {{ .Values.redisImage.pullPolicy }}
          ports:
            - name: redis
              containerPort: {{ .Values.redis.port }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
