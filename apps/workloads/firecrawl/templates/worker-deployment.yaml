apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-worker
  labels:
    {{- include "firecrawl.labels" . | nindent 4 }}
    app.kubernetes.io/name: firecrawl-worker
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: firecrawl-worker
      app.kubernetes.io/part-of: firecrawl
  template:
    metadata:
      labels:
        app.kubernetes.io/name: firecrawl-worker
        app.kubernetes.io/component: worker
        {{- include "firecrawl.labels" . | nindent 8 }}
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "--max-old-space-size=2048", "dist/src/services/queue-worker.js"]
          ports:
            - name: http
              containerPort: {{ .Values.worker.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: firecrawl-config
          env:
            - name: BULL_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "firecrawl.secretName" . }}
                  key: BULL_AUTH_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "firecrawl.secretName" . }}
                  key: OPENAI_API_KEY
                  optional: true
            {{- if .Values.nuqPostgres.enabled }}
            - name: NUQ_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "firecrawl.pgSecretName" . }}
                  key: NUQ_DATABASE_URL
                  optional: true
            - name: NUQ_DATABASE_URL_LISTEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "firecrawl.pgSecretName" . }}
                  key: NUQ_DATABASE_URL_LISTEN
                  optional: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
