{{- if .Values.extractWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-extract-worker
  labels:
    {{- include "firecrawl.labels" . | nindent 4 }}
    app.kubernetes.io/name: firecrawl-extract-worker
    app.kubernetes.io/component: extract-worker
spec:
  replicas: {{ .Values.extractWorker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: firecrawl-extract-worker
      app.kubernetes.io/part-of: firecrawl
  template:
    metadata:
      labels:
        app.kubernetes.io/name: firecrawl-extract-worker
        app.kubernetes.io/component: extract-worker
        {{- include "firecrawl.labels" . | nindent 8 }}
    spec:
      containers:
        - name: extract-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "--max-old-space-size=2048", "dist/src/services/extract-worker.js"]
          ports:
            - name: http
              containerPort: {{ .Values.extractWorker.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: firecrawl-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "firecrawl.secretName" . }}
                  key: OPENAI_API_KEY
                  optional: true
            {{- if .Values.nuqPostgres.enabled }}
            - name: NUQ_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "firecrawl.pgSecretName" . }}
                  key: NUQ_DATABASE_URL
                  optional: true
            - name: NUQ_DATABASE_URL_LISTEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "firecrawl.pgSecretName" . }}
                  key: NUQ_DATABASE_URL_LISTEN
                  optional: true
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.extractWorker.resources | nindent 12 }}
{{- end }}
