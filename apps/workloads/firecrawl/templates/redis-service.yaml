apiVersion: v1
kind: Service
metadata:
  name: firecrawl-redis
  labels:
    {{- include "firecrawl.labels" . | nindent 4 }}
    app.kubernetes.io/name: firecrawl-redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: firecrawl-redis
    app.kubernetes.io/part-of: firecrawl
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: redis
      protocol: TCP
      name: redis
