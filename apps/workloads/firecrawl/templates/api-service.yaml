apiVersion: v1
kind: Service
metadata:
  name: firecrawl-api
  labels:
    {{- include "firecrawl.labels" . | nindent 4 }}
    app.kubernetes.io/name: firecrawl-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: firecrawl-api
    app.kubernetes.io/part-of: firecrawl
  ports:
    - port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
      name: http
