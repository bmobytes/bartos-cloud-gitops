apiVersion: apps/v1
kind: Deployment
metadata:
  name: honcho-ui
  namespace: honcho
  labels:
    app.kubernetes.io/name: honcho-ui
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: honcho
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: honcho-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: honcho-ui
        app.kubernetes.io/component: ui
        app.kubernetes.io/part-of: honcho
    spec:
      containers:
        - name: nginx
          image: nginx:1-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: html
          configMap:
            name: honcho-ui-html
        - name: nginx-conf
          configMap:
            name: honcho-ui-nginx
            items:
              - key: nginx.conf
                path: default.conf
