apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-webui
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: open-webui
  sources:
    - repoURL: https://helm.openwebui.com/
      chart: open-webui
      targetRevision: 13.3.1
      helm:
        valueFiles:
          - $values/apps/workloads/open-webui/values.yaml
    - repoURL: git@github.com:bmobytes/bartos-cloud-gitops.git
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
