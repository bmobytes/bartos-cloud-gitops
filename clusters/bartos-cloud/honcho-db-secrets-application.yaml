apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: honcho-db-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/bmobytes/bartos-cloud-gitops.git
    targetRevision: main
    path: apps/secrets/honcho-db
  destination:
    server: https://kubernetes.default.svc
    namespace: honcho
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
